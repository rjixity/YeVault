<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YE Vault</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
 
<nav class="nav">
  <div class="nav-logo">YE VAULT</div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="u" onclick="switchTab('u','Songs')">Unreleased</button>
    <button class="nav-tab" data-tab="r" onclick="switchTab('r','Songs')">Released</button>
    <button class="nav-tab" data-tab="a" onclick="switchTab('a','Links')">Album Copies</button>
  </div>
  <div class="nav-stats">
    <div class="nav-stat"><span id="nav-eras">—</span> eras</div>
    <div class="nav-stat"><span id="nav-songs">—</span> songs</div>
  </div>
</nav>
 
<div class="hero">
  <div id="hero-bg"></div>
  <div class="hero-title">YE VAULT</div>
  <div class="hero-sub">a collection of Ye's full discography</div>
</div>
 
<div class="search-wrap">
  <input id="search-box" class="search-box" type="text" placeholder="search songs or eras..." oninput="onSearch(this.value)" autocomplete="off" spellcheck="false">
</div>
 
<div class="era-list" id="era-list"></div>
 
<!-- PLAYER -->
<div class="player" id="player">
  <div class="player-info">
    <div class="player-title" id="p-title">—</div>
    <div class="player-era" id="p-era"></div>
    <div class="player-error" id="p-error">⚠ can't stream this file &nbsp;<a id="p-ext-err" href="#" target="_blank" rel="noopener" style="color:#9c78ff;text-decoration:none;font-weight:500">open on pillows.su →</a></div>
  </div>
  <div class="player-progress">
    <span class="player-time" id="p-cur">0:00</span>
    <div class="progress-bar" id="p-bar"><div class="progress-fill" id="p-fill"></div></div>
    <span class="player-time" id="p-dur">0:00</span>
  </div>
  <div class="player-controls">
    <button class="player-btn player-play" id="p-play" onclick="togglePlay()">
      <svg viewBox="0 0 10 10"><polygon points="2,1 9,5 2,9"/></svg>
    </button>
    <a class="player-external" id="p-ext" href="#" target="_blank" rel="noopener noreferrer" title="Open externally">
      <svg viewBox="0 0 24 24" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </a>
    <button class="player-close" onclick="closePlayer()">✕</button>
  </div>
</div>
 
<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
